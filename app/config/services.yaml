# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
  app.api.key: "abc"
  app.personio.api.base_uri: "https://api.personio.de/v1"
  app.default_locale : 'en'
  app.supported_locales: ['en','de']

services:
  # default configuration for services in *this* file
  _defaults:
    autowire: true # Automatically injects dependencies in your services.
    autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
    bind:
      array $enabledLocales: '%kernel.enabled_locales%'
      string $defaultLocale: '%app.default_locale%'

  # makes classes in src/ available to be used as services
  # this creates a service per class whose id is the fully-qualified class name
  App\:
    resource: "../src/"
    exclude:
      - "../src/DependencyInjection/"
      - "../src/Entity/"
      - "../src/Kernel.php"

  # add more service definitions when explicit configuration is needed
  # please note that last definitions always *replace* previous ones

  app.serializer.json:
    class: 'App\Serializer\JsonSerializer'
    factory: ['App\Serializer\JsonSerializerFactory', "create"]

  monolog.formatter.default:
    class: Monolog\Formatter\LineFormatter
    arguments:
      - "[%%datetime%%] [%%extra.token%%] %%channel%%.%%level_name%%: %%message%% %%context%% %%extra%%\n"
      - "d.m.Y, G:i:s"

  app.personio.api.http_client_factory:
    class: 'App\Personio\Api\HttpClient\HttpClientFactory'

  app.personio.api.http_client:
    class: 'Symfony\Contracts\HttpClient\HttpClientInterface'
    factory: ['@App\Personio\Api\HttpClient\HttpClientFactory', "create"]

  App\Service\Personio\Api\ApiEmployeeService:
    arguments:
      $httpClient: "@app.personio.api.http_client"
      # $serializer: '@app.serializer.json'

  App\Service\Personio\Api\ApiAttendanceService:
    arguments:
      $httpClient: "@app.personio.api.http_client"
